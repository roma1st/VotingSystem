name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore VotingSystem.slnx

    - name: Build
      run: dotnet build VotingSystem.slnx --no-restore --configuration Release

    - name: Test Api.Tests
      run: dotnet test tests/VotingSystem.Api.Tests/VotingSystem.Api.Tests.csproj --no-build --verbosity normal --configuration Release

    - name: Test Api.Tests.Integration
      run: dotnet test tests/VotingSystem.Api.Tests.Integration/VotingSystem.Api.Tests.Integration.csproj --no-build --verbosity normal --configuration Release

    - name: Test Api.Tests.Database
      run: dotnet test tests/VotingSystem.Api.Tests.Database/VotingSystem.Api.Tests.Database.csproj --no-build --verbosity normal --configuration Release
