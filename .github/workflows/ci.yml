name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --no-restore --configuration Release
      
    - name: Test Unit Tests
      run: dotnet test VotingSystem.UnitTests/VotingSystem.UnitTests.csproj --no-build --verbosity normal --configuration Release
      
    - name: Test Integration Tests
      run: dotnet test VotingSystem.IntegrationTests/VotingSystem.IntegrationTests.csproj --no-build --verbosity normal --configuration Release
