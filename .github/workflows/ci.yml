name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: VotingSystem
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --no-restore --configuration Release
      
    - name: Test Unit Tests
      run: dotnet test VotingSystem.UnitTests/VotingSystem.UnitTests.csproj --no-build --verbosity normal --configuration Release
      
    - name: Test Integration Tests
      run: dotnet test VotingSystem.IntegrationTests/VotingSystem.IntegrationTests.csproj --no-build --verbosity normal --configuration Release

  performance-test:
    needs: build-and-test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: VotingSystem
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup k6
      uses: grafana/setup-k6-action@v1

    - name: Restore and Build
      run: |
        dotnet restore
        dotnet build --no-restore --configuration Release

    - name: Start API for k6 Tests
      run: dotnet run --project VotingSystem.Api/VotingSystem.Api.csproj --configuration Release &
      env:
        ASPNETCORE_URLS: http://localhost:5032
        
    - name: Wait for API to be ready
      run: |
        for i in $(seq 1 30); do
          if curl -s -o /dev/null -w "%{http_code}" localhost:5032/swagger/index.html | grep -q "200"; then
            echo "API is ready"
            break
          fi
          echo "Waiting... ($i)"
          sleep 2
        done

    - name: Run k6 Load Test
      run: k6 run VotingSystem.PerformanceTests/k6/load-test.js --summary-export=k6-results.json

    - name: Upload results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: k6-results
        path: k6-results.json
